front:
  text: 金剛三昧經注解敘夫真心獨露若皓月之朗於太虗法性無虧似驪珠之耀於滄海了了不昧日用明明無生即生以真如不守自性而變現隨緣生即無生以實相本來無物而一塵不受求之叵得如木中火決定是有而方處無憑體之即神比鏡內華儼然可見而取不能得無方妙用猶映色之摩尼影雖移而體實不變具足本來若迷家之貧子身雖困而寶未嘗無悲夫我輩沈埋曠劫迷背日深本有家財致生難認良由不逢善友開悟何從故我如來離兜率降皇宮捨富貴逃雪嶺苦行六年覩星成道作衆生之慈父為九界之宗師三七思惟法輪大轉蓋為利鈍難齊所以教分漸頓四十餘年欲說不能說權實互覆涅槃時近欲休不能休罄示一心其猶握金剛劒用斬群疑豎正法幢破諸邪惑革小乘而純入一乘會百川而同歸大海真救病之良藥運寶筏以濟人是故世尊無問自說施甘露而普救沉疴伽陀說偈贊揚鼓瑟琶而相席打令解脫發廣問之端知六度皆歸無相心王問無生之義識三行惟一自心無住示法身非來非去大力啓果德有證有修身子重聞一偈之因緣達真空具含四德梵行守真修之一味即俗諦頓具四緣地藏騰七品之餘疑阿難請一經之名字始末究竟秪是自心前後辨明寧逃法性惜乎澆漓末世妙典難逢茲得無瑕師夢祈神授刻此流通旨奧文奇讀者倣佛由是不揣愚庸伸此管見若夫昔人片言而擲地金聲一語而大千廣被余何敢言但心慕大乘聊希贊嘆奈聖言莫測凡智叵思倘或淆訛願施懺悔明傳曹洞正宗第二十七代會稽雲門山顯聖寺住持圓澄注并序金剛三昧經注解目次卷第一自序序品第一無相法品第二卷第二無性行品第三本覺利品第四卷第三入實際品第五真性空品第六卷第四如來藏品第七總持品第八跋金剛三昧經注解目次終
